# AppProject CRD
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: ocr-project
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "GitOps project for OCR Model and API Gateway"
  sourceRepos:
    - '*'
  destinations:
    - namespace: 'ocr-app'
      server: 'https://kubernetes.default.svc'
    - namespace: 'monitoring'
      server: 'https://kubernetes.default.svc'
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
---
# ApplicationSet CRD
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ocr-services-appset
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - name: ocr-model-server
            chartPath: charts/ocr-model-server
          - name: ocr-api-gateway
            chartPath: charts/api-gateway
  template:
    metadata:
      name: '{{name}}'
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: ocr-project
      source:
        repoURL: 'https://github.com/azmeth23/devops-assignment.git'
        targetRevision: HEAD
        path: '{{chartPath}}'
        helm:
          valueFiles:
            - values.yaml
      destination:
        server: 'https://kubernetes.default.svc'
        namespace: ocr-app
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
---
# Application CRD (Standalone Application)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ocr-monitoring-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: ocr-project
  source:
    repoURL: 'https://prometheus-community.github.io/helm-charts'
    chart: kube-prometheus-stack
    targetRevision: 55.0.0
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true